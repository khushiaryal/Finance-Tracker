<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#bdbbdd,#7C3AED,#b1d8df);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}
.dashboard{

    width:1200px;
    height:700px;

    background:rgba(92, 73, 73, 0.15);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.2);

    border-radius:30px;

    display:grid;
    grid-template-columns:260px 1fr;

    overflow:hidden;

    box-shadow:
    0 20px 60px rgba(0,0,0,.25);
}

/* SIDEBAR */

.sidebar{

    background:rgba(255,255,255,.08);

    padding:40px 30px;

    color:rgb(237, 243, 179);

}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:30px;
    font-weight:700;
    margin-bottom:50px;
}

.logo img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.logo span{
    color:#f8f6f6;
}
.menu{

    list-style:none;

}

.menu li{

    padding:16px 20px;

    margin-bottom:15px;

    border-radius:15px;

    cursor:pointer;

    transition:.3s;

}

.menu li:hover{

    background:rgba(255,255,255,.15);

    transform:translateX(8px);

}

.menu .active{

    background:rgb(190, 166, 166);

    color:#b7b4f0;

    font-weight:600;

}

/* MAIN */

.main{

    background:#f8fafc;

    padding:35px;

}

/* NAVBAR */

.navbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

}

.navbar h1{

    font-size:30px;

    color:#1E293B;

}

.profile{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

/* CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;

    margin-bottom:30px;

}

.card{

    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
    transition:.3s;
}
.card:hover{
    transform:translateY(-8px);
}
.card h4{
    color:#64748B;
    margin-bottom:12px;
}
.card h2{
    font-size:30px;
    color:#0F172A;
}
.green{
    color:#10B981;
}
.red{
    color:#EF4444;

}

.blue{

    color:#4F46E5;

}

/* CONTENT */

.content{

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:20px;

}

.transactions{

    background:white;

    border-radius:20px;

    padding:25px;

    box-shadow:0 10px 25px rgba(0,0,0,.06);

}

.transactions h3{

    margin-bottom:20px;

    color:#0F172A;

}

.item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:15px 0;

    border-bottom:1px solid #eee;

}

.chart{

    background:white;

    border-radius:20px;

    padding:25px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:70px;

    box-shadow:0 10px 25px rgba(0,0,0,.06);

}

.add-btn{

    border:none;

    background:#4F46E5;

    color:white;

    padding:14px 24px;

    border-radius:12px;

    font-size:16px;

    cursor:pointer;

    transition:.3s;

    margin-top:20px;

    float:right;

}

.add-btn:hover{

    background:#4338CA;

    transform:translateY(-2px);

}
/* CALCULATOR */

.calculator{
    background:white;
    border-radius:18px;
    padding:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    width:280px;
    margin:auto;
}

.calculator h3{
    text-align:center;
    font-size:18px;
    margin-bottom:12px;
    color:#4F46E5;
}

#display{
    width:100%;
    height:45px;
    border:none;
    outline:none;
    background:#f3f3f3;
    border-radius:10px;
    text-align:right;
    padding:10px;
    font-size:22px;
    margin-bottom:12px;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

.calc-grid button{
    position:static;
    width:100%;
    height:45px;
    padding:0;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#ede9fe;
    color:#4F46E5;
    cursor:pointer;
    transition:.2s;
}

.calc-grid button:hover{
    background:#7C3AED;
    color:white;
}

.equal{
    background:#4F46E5 !important;
    color:white !important;
}

.zero{
    grid-column:span 2;
}
.transaction-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">
        <div class="logo">
    <span>FINTECH</span>
</div>
              
        <ul class="menu">

            <li class="active">Dashboard</li>

            <li>Transactions</li>

            <li>Analytics</li>

            <li>Budgets</li>

            <li>Settings</li>

        </ul>

    </aside>

    <main class="main">

        <div class="navbar">

            <h1>Welcome Back, Khusss👋</h1>

            <div class="profile">
                <img src="khusu.jpg" alt="Khushi" class="profile">
            </div>

        </div>

        <div class="cards">

            <div class="card">

                <h4>Total Balance</h4>

                <h2>$10,500</h2>

            </div>

            <div class="card">

                <h4>Income</h4>

                <h2 class="green">+$4,800</h2>

            </div>

            <div class="card">

                <h4>Expenses</h4>

                <h2 class="red">-$1,230</h2>

            </div>

            <div class="card">

                <h4>Savings</h4>

                <h2 class="blue">$3,570</h2>

            </div>

        </div>

        <div class="content">

            <div class="transactions">
                

             <div class="transaction-header">

    <h3>Recent Transactions</h3>

    <button class="add-btn">+ Add Transaction</button>

</div>

                <div class="item">
                    <span>Coffee</span>
                    <strong>-$8</strong>
                </div>

                <div class="item">
                    <span>Salary</span>
                    <strong class="green">+$900</strong>
                </div>

                <div class="item">
                    <span>Shopping</span>
                    <strong>-$120</strong>
                </div>

                <div class="item">
                    <span>Dinner</span>
                    <strong>-$35</strong>
                </div>

            </div>

            <div class="calculator">

    <h3>Calculator</h3>

    <input type="text" id="display" readonly>

    <div class="calc-grid">

        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>

    </div>

</div>

        </div>

    </main>
<script>

function clearDisplay(){
    document.getElementById("display").value = "";
}

function appendValue(value){
    document.getElementById("display").value += value;
}

function deleteLast(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

function calculate(){

    let display = document.getElementById("display");

    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }

}

</script>

</body>
</html>
